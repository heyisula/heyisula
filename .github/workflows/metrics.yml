name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "Update metrics"
          committer_branch: main
          committer_gist: false

          user: heyisula
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Colombo
          config_output: default

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github

          plugin_notable: yes
          plugin_notable_filter: stars:>50

          plugin_repositories: yes
          plugin_repositories_order: pushed
          plugin_repositories_pinned: 0
          plugin_repositories_limit: 4
